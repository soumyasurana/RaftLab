
services:
  node1:
    container_name: raft-node1
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    ports:
      - "8081:8080"
      - "50051:50051"
    volumes:
      - ./configs/docker/node1.yaml:/app/config.yaml
      - ./data/node1:/app/data/node1
    environment:
      CONFIG_PATH: /app/config.yaml
    restart: unless-stopped
    networks:
      - raft-network

  node2:
    container_name: raft-node2
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    ports:
      - "8082:8080"
      - "50052:50051"
    volumes:
      - ./configs/docker/node2.yaml:/app/config.yaml
      - ./data/node2:/app/data/node2
    environment:
      CONFIG_PATH: /app/config.yaml
    restart: unless-stopped
    networks:
      - raft-network

  node3:
    container_name: raft-node3
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    ports:
      - "8083:8080"
      - "50053:50051"
    volumes:
      - ./configs/docker/node3.yaml:/app/config.yaml
      - ./data/node3:/app/data/node3
    environment:
      CONFIG_PATH: /app/config.yaml
    restart: unless-stopped
    networks:
      - raft-network

  node4:
    container_name: raft-node4
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    ports:
      - "8084:8080"
      - "50054:50051"
    volumes:
      - ./configs/docker/node4.yaml:/app/config.yaml
      - ./data/node4:/app/data/node4
    environment:
      CONFIG_PATH: /app/config.yaml
    restart: unless-stopped
    networks:
      - raft-network

  node5:
    container_name: raft-node5
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    ports:
      - "8085:8080"
      - "50055:50051"
    volumes:
      - ./configs/docker/node5.yaml:/app/config.yaml
      - ./data/node5:/app/data/node5
    environment:
      CONFIG_PATH: /app/config.yaml
    restart: unless-stopped
    networks:
      - raft-network

  dashboard:
    container_name: raft-dashboard
    build:
      context: ..
      dockerfile: dashboard/Dockerfile
    ports:
      - "3000:3000"
    environment:
      RAFTLAB_NODE_URLS: http://node1:8080,http://node2:8080,http://node3:8080,http://node4:8080,http://node5:8080
    depends_on:
      - node1
      - node2
      - node3
      - node4
      - node5
    restart: unless-stopped
    networks:
      - raft-network

networks:
  raft-network:
    driver: bridge