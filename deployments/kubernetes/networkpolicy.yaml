apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: raft
spec:
  podSelector:
    matchLabels:
      app: raft
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: raft
      ports:
        - protocol: TCP
          port: 50051
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: raft
      ports:
        - protocol: TCP
          port: 50051
        - protocol: TCP
          port: 8080
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
