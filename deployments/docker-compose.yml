version: '3.8'

services:
  node1:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    ports:
      - "8081:8080"
      - "50051:50051"
    volumes:
      - ./configs/node1.yaml:/app/config.yaml
    environment:
      - CONFIG_PATH=/app/config.yaml

  node2:
